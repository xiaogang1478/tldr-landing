<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>痛点雷达 - 帮你找到用户抱怨最多的地方</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #fafafa;
            --text-secondary: #888;
            --accent: #ff6b35;
            --accent-alt: #ffb347;
            --border: #2a2a2a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Hero Section */
        .hero {
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 600px;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.15) 0%, transparent 60%);
            pointer-events: none;
        }
        
        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 32px;
        }
        
        .hero-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .hero h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }
        
        .hero h1 .highlight {
            color: var(--accent);
            position: relative;
        }
        
        .hero-sub {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 540px;
            margin-bottom: 48px;
        }
        
        .hero-cta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
        }
        
        .btn-primary:hover {
            background: #ff8c5a;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--text-secondary);
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin: 80px 0;
        }
        
        .stat-item {
            background: var(--bg-secondary);
            padding: 32px 24px;
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
        }
        
        /* Search Section */
        .search-section {
            margin: 60px 0;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 24px 24px 24px 64px;
            font-size: 1.1rem;
            font-family: inherit;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }
        
        .search-box input::placeholder {
            color: var(--text-secondary);
        }
        
        .search-box input:focus {
            border-color: var(--accent);
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        
        /* Category Pills */
        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        
        .cat-pill {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cat-pill:hover, .cat-pill.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        
        /* Results */
        .results {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 60px 0;
        }
        
        .pain-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.2s;
        }
        
        .pain-card:hover {
            border-color: var(--accent);
            transform: translateX(8px);
        }
        
        .pain-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .pain-title {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .pain-badge {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .pain-content {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        
        .pain-meta {
            display: flex;
            gap: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .pain-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pain-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }
        
        .pain-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-alt));
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        /* Quote Section */
        .quote-section {
            margin: 100px 0;
            text-align: center;
            padding: 60px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .quote-text {
            font-size: 1.75rem;
            font-weight: 500;
            max-width: 700px;
            margin: 0 auto 24px;
            line-height: 1.5;
        }
        
        .quote-author {
            color: var(--text-secondary);
        }
        
        /* CTA Section */
        .cta-section {
            margin: 100px 0;
            text-align: center;
            padding: 80px 40px;
            background: var(--bg-secondary);
            border-radius: 24px;
        }
        
        .cta-section h2 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        
        .cta-section p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .wechat-id {
            display: inline-block;
            padding: 16px 32px;
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        /* Footer */
        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero {
                padding: 80px 0 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <section class="hero">
            <div class="hero-label">内测中</div>
            <h1>找到用户<br><span class="highlight">抱怨最多</span>的地方</h1>
            <p class="hero-sub">痛点雷达挖掘全网真实用户抱怨，帮你发现创业机会。哪里用户最不满，哪里就有机会。</p>
            <div class="hero-cta">
                <a href="#search" class="btn btn-primary">开始探索 →</a>
                <a href="#about" class="btn btn-secondary">了解更多</a>
            </div>
        </section>
        
        <!-- Stats -->
        <section class="stats-bar" id="about">
            <div class="stat-item">
                <div class="stat-number">21</div>
                <div class="stat-label">真实痛点案例</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">9</div>
                <div class="stat-label">覆盖行业</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">1</div>
                <div class="stat-label">AI分析引擎</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">付费门槛</div>
            </div>
        </section>
        
        <!-- Search -->
        <section class="search-section" id="search">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索关键词，如：笔记、外卖、客服..." oninput="filterResults()">
            </div>
            <div class="categories">
                <div class="cat-pill active" data-cat="all">全部</div>
                <div class="cat-pill" data-cat="生活服务">生活服务</div>
                <div class="cat-pill" data-cat="金融理财">金融理财</div>
                <div class="cat-pill" data-cat="职场">职场</div>
                <div class="cat-pill" data-cat="教育学习">教育学习</div>
                <div class="cat-pill" data-cat="健康医疗">健康医疗</div>
                <div class="cat-pill" data-cat="出行">出行</div>
                <div class="cat-pill" data-cat="娱乐">娱乐</div>
                <div class="cat-pill" data-cat="科技">科技</div>
            </div>
        </section>
        
        <!-- Results -->
        <section class="results" id="results"></section>
        
        <!-- Quote -->
        <section class="quote-section">
            <p class="quote-text">"创业的本质，不是创造新东西，而是让用户的不满意消失。"</p>
            <p class="quote-author">— 痛点雷达</p>
        </section>
        
        <!-- CTA -->
        <section class="cta-section">
            <h2>想了解更多？</h2>
            <p>如果你觉得这个方向有用，或者想参与内测</p>
            <div class="wechat-id">微信号：W18514701881</div>
            <p style="margin-top: 12px; font-size: 0.85rem;">添加请备注「痛点」</p>
        </section>
        
        <!-- Footer -->
        <footer>
            <p>痛点雷达 MVP - 数据来源：知乎/微博/即刻</p>
        </footer>
    </div>
    
    <script src="data.js"></script>
</body>
</html>
