<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>痛点雷达 - MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        header h1 { font-size: 2em; margin-bottom: 12px; }
        header p { opacity: 0.9; font-size: 1.1em; }
        
        /* Search */
        .search-box {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .search-box input {
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: #667eea; }
        
        /* Stats */
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 120px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .number {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }
        .stat-card .label {
            color: #888;
            font-size: 0.9em;
            margin-top: 4px;
        }
        
        /* Category filters */
        .categories {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .cat-tag {
            padding: 8px 16px;
            background: white;
            border: 1px solid #eee;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-tag:hover, .cat-tag.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        /* Results */
        .results { display: flex; flex-direction: column; gap: 16px; }
        
        .pain-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid #667eea;
        }
        .pain-card .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .pain-card .title {
            font-size: 1.1em;
            font-weight: 600;
            color: #1a1a1a;
        }
        .pain-card .badge {
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 0.8em;
        }
        .pain-card .content {
            color: #555;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .pain-card .meta {
            display: flex;
            gap: 16px;
            color: #888;
            font-size: 0.85em;
        }
        .pain-card .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Pain level bar */
        .pain-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 12px;
        }
        .pain-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 痛点雷达 MVP</h1>
            <p>帮你找到用户抱怨最多的地方</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索关键词，如：笔记、外卖、客服..." oninput="filterResults()">
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">10</div>
                <div class="label">痛点总数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="categoryCount">6</div>
                <div class="label">覆盖行业</div>
            </div>
            <div class="stat-card">
                <div class="number">1256+</div>
                <div class="label">数据来源</div>
            </div>
        </div>
        
        <div class="categories" id="categories">
            <div class="cat-tag active" onclick="filterByCategory('all')">全部</div>
            <div class="cat-tag" onclick="filterByCategory('效率工具')">效率工具</div>
            <div class="cat-tag" onclick="filterByCategory('生活服务')">生活服务</div>
            <div class="cat-tag" onclick="filterByCategory('金融理财')">金融理财</div>
            <div class="cat-tag" onclick="filterByCategory('教育学习')">教育学习</div>
            <div class="cat-tag" onclick="filterByCategory('健康医疗')">健康医疗</div>
            <div class="cat-tag" onclick="filterByCategory('社交娱乐')">社交娱乐</div>
        </div>
        
        <div class="results" id="results">
            <!-- Results will be inserted here -->
        </div>
        
        <footer>
            <p>痛点雷达 MVP - 数据来源：知乎/微博/即刻</p>
        </footer>
    </div>
    
    <script>
        // Load data
        let allData = [];
        
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                allData = data.pain_points;
                renderResults(allData);
            });
        
        let currentCategory = 'all';
        let currentSearch = '';
        
        function filterResults() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        }
        
        function filterByCategory(cat) {
            currentCategory = cat;
            
            // Update active state
            document.querySelectorAll('.cat-tag').forEach(tag => {
                tag.classList.remove('active');
                if (tag.textContent === (cat === 'all' ? '全部' : cat)) {
                    tag.classList.add('active');
                }
            });
            
            applyFilters();
        }
        
        function applyFilters() {
            let filtered = allData.filter(item => {
                // Category filter
                if (currentCategory !== 'all' && item.category !== currentCategory) {
                    return false;
                }
                
                // Search filter
                if (currentSearch) {
                    const searchText = (item.title + ' ' + item.content + ' ' + item.keyword).toLowerCase();
                    if (!searchText.includes(currentSearch)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            renderResults(filtered);
        }
        
        function renderResults(items) {
            const container = document.getElementById('results');
            document.getElementById('totalCount').textContent = items.length;
            
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">没有找到相关痛点</p>';
                return;
            }
            
            container.innerHTML = items.map(item => '
                <div class="pain-card">
                    <div class="header">
                        <div class="title">' + item.title + '</div>
                        <div class="badge">' + item.category + '</div>
                    </div>
                    <div class="content">' + item.content + '</div>
                    <div class="pain-bar"><div class="fill" style="width:' + (item.pain_level * 10) + '%"></div></div>
                    <div class="meta">
                        <span>🔥 热度 ' + item.frequency + '</span>
                        <span>📊 痛度 ' + item.pain_level + '/10</span>
                        <span>💬 ' + item.platform + '</span>
                    </div>
                </div>
            ').join('');
        }
    </script>
</body>
</html>
