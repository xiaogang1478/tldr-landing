<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>痛点雷达 - 帮你找到用户抱怨最多的地方</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #fafafa;
            --text-secondary: #888;
            --accent: #ff6b35;
            --accent-alt: #ffb347;
            --border: #2a2a2a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Hero Section */
        .hero {
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 600px;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.15) 0%, transparent 60%);
            pointer-events: none;
        }
        
        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 32px;
        }
        
        .hero-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .hero h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }
        
        .hero h1 .highlight {
            color: var(--accent);
            position: relative;
        }
        
        .hero-sub {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 540px;
            margin-bottom: 48px;
        }
        
        .hero-cta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
        }
        
        .btn-primary:hover {
            background: #ff8c5a;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--text-secondary);
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin: 80px 0;
        }
        
        .stat-item {
            background: var(--bg-secondary);
            padding: 32px 24px;
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
        }
        
        /* Search Section */
        .search-section {
            margin: 60px 0;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 24px 24px 24px 64px;
            font-size: 1.1rem;
            font-family: inherit;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }
        
        .search-box input::placeholder {
            color: var(--text-secondary);
        }
        
        .search-box input:focus {
            border-color: var(--accent);
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        
        /* Category Pills */
        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        
        .cat-pill {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cat-pill:hover, .cat-pill.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        
        /* Results */
        .results {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 60px 0;
        }
        
        .pain-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.2s;
        }
        
        .pain-card:hover {
            border-color: var(--accent);
            transform: translateX(8px);
        }
        
        .pain-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .pain-title {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .pain-badge {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .pain-content {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        
        .pain-meta {
            display: flex;
            gap: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .pain-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pain-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }
        
        .pain-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-alt));
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        /* Quote Section */
        .quote-section {
            margin: 100px 0;
            text-align: center;
            padding: 60px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .quote-text {
            font-size: 1.75rem;
            font-weight: 500;
            max-width: 700px;
            margin: 0 auto 24px;
            line-height: 1.5;
        }
        
        .quote-author {
            color: var(--text-secondary);
        }
        
        /* CTA Section */
        .cta-section {
            margin: 100px 0;
            text-align: center;
            padding: 80px 40px;
            background: var(--bg-secondary);
            border-radius: 24px;
        }
        
        .cta-section h2 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        
        .cta-section p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .wechat-id {
            display: inline-block;
            padding: 16px 32px;
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        /* Footer */
        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero {
                padding: 80px 0 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <section class="hero">
            <div class="hero-label">内测中</div>
            <h1>找到用户<br><span class="highlight">抱怨最多</span>的地方</h1>
            <p class="hero-sub">痛点雷达挖掘全网真实用户抱怨，帮你发现创业机会。哪里用户最不满，哪里就有机会。</p>
            <div class="hero-cta">
                <a href="#search" class="btn btn-primary">开始探索 →</a>
                <a href="#about" class="btn btn-secondary">了解更多</a>
            </div>
        </section>
        
        <!-- Stats -->
        <section class="stats-bar" id="about">
            <div class="stat-item">
                <div class="stat-number">10</div>
                <div class="stat-label">真实痛点案例</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">6</div>
                <div class="stat-label">覆盖行业</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">1</div>
                <div class="stat-label">AI分析引擎</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">付费门槛</div>
            </div>
        </section>
        
        <!-- Search -->
        <section class="search-section" id="search">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索关键词，如：笔记、外卖、客服..." oninput="filterResults()">
            </div>
            <div class="categories">
                <div class="cat-pill active" data-cat="all">全部</div>
                <div class="cat-pill" data-cat="效率工具">效率工具</div>
                <div class="cat-pill" data-cat="生活服务">生活服务</div>
                <div class="cat-pill" data-cat="金融理财">金融理财</div>
                <div class="cat-pill" data-cat="教育学习">教育学习</div>
                <div class="cat-pill" data-cat="健康医疗">健康医疗</div>
                <div class="cat-pill" data-cat="社交娱乐">社交娱乐</div>
            </div>
        </section>
        
        <!-- Results -->
        <section class="results" id="results"></section>
        
        <!-- Quote -->
        <section class="quote-section">
            <p class="quote-text">"创业的本质，不是创造新东西，而是让用户的不满意消失。"</p>
            <p class="quote-author">— 痛点雷达</p>
        </section>
        
        <!-- CTA -->
        <section class="cta-section">
            <h2>想了解更多？</h2>
            <p>如果你觉得这个方向有用，或者想参与内测</p>
            <div class="wechat-id">微信号：W18514701881</div>
            <p style="margin-top: 12px; font-size: 0.85rem;">添加请备注「痛点」</p>
        </section>
        
        <!-- Footer -->
        <footer>
            <p>痛点雷达 MVP - 数据来源：知乎/微博/即刻</p>
        </footer>
    </div>
    
    <script>
        var allData = [
            {id:1,keyword:"笔记软件",title:"印象笔记越来越慢",content:"印象笔记越来越慢，付费会员还涨价，功能越来越杂，Evernote根本没法用",platform:"知乎",category:"效率工具",painLevel:8,frequency:156},
            {id:2,keyword:"邮箱",title:"每天处理100封邮件",content:"每天处理100封邮件，根本回不过来，邮件分类功能完全是鸡肋",platform:"知乎",category:"效率工具",painLevel:9,frequency:203},
            {id:3,keyword:"会议",title:"开会1小时有用10分钟",content:"开会1小时，真正有用的内容就10分钟，剩下都在扯皮",platform:"微博",category:"效率工具",painLevel:10,frequency:312},
            {id:4,keyword:"外卖",title:"同一店App比小程序贵",content:"同一个店，App价格比小程序贵2块，平台杀熟太明显了",platform:"微博",category:"生活服务",painLevel:7,frequency:89},
            {id:5,keyword:"客服",title:"等半小时解决不了问题",content:"找客服要等半小时，机器人听不懂人话，最后还是解决不了问题",platform:"知乎",category:"生活服务",painLevel:9,frequency:178},
            {id:6,keyword:"信用卡",title:"还款提醒都没有",content:"信用卡还款日到了没有任何提醒，晚了1天就上征信，太坑了",platform:"微博",category:"金融理财",painLevel:10,frequency:245},
            {id:7,keyword:"保险",title:"条款看不懂出事不赔",content:"保险条款几十页，看不懂，等真出事了发现这不赔那不赔",platform:"知乎",category:"金融理财",painLevel:9,frequency:198},
            {id:8,keyword:"课程",title:"买课发现是录播",content:"买了199的课，进去发现是录播，而且内容搜一下就能免费看",platform:"知乎",category:"教育学习",painLevel:8,frequency:134},
            {id:9,keyword:"挂号",title:"三甲医院挂号难",content:"三甲医院挂号要提前一周，根本抢不到，黄牛号贵3倍",platform:"微博",category:"健康医疗",painLevel:10,frequency:267},
            {id:10,keyword:"微信",title:"工作生活群混一起",content:"工作群和生活群混在一起，下班后还要回消息，根本没有生活",platform:"微博",category:"社交娱乐",painLevel:8,frequency:445}
        ];
        
        var currentCategory = "all";
        var currentSearch = "";
        
        function filterResults() {
            currentSearch = document.getElementById("searchInput").value.toLowerCase();
            applyFilters();
        }
        
        function filterByCategory(cat) {
            currentCategory = cat;
            var pills = document.querySelectorAll(".cat-pill");
            for (var i = 0; i < pills.length; i++) {
                pills[i].classList.remove("active");
                if (pills[i].getAttribute("data-cat") === cat) {
                    pills[i].classList.add("active");
                }
            }
            applyFilters();
        }
        
        function applyFilters() {
            var filtered = [];
            for (var i = 0; i < allData.length; i++) {
                var item = allData[i];
                if (currentCategory !== "all" && item.category !== currentCategory) continue;
                if (currentSearch) {
                    var searchText = (item.title + " " + item.content + " " + item.keyword).toLowerCase();
                    if (searchText.indexOf(currentSearch) === -1) continue;
                }
                filtered.push(item);
            }
            renderResults(filtered);
        }
        
        function renderResults(items) {
            var container = document.getElementById("results");
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关痛点</p></div>';
                return;
            }
            
            var html = "";
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                html += '<div class="pain-card">';
                html += '<div class="pain-header">';
                html += '<div class="pain-title">' + item.title + '</div>';
                html += '<div class="pain-badge">' + item.category + '</div>';
                html += '</div>';
                html += '<div class="pain-content">' + item.content + '</div>';
                html += '<div class="pain-bar"><div class="pain-bar-fill" style="width:' + (item.painLevel * 10) + '%"></div></div>';
                html += '<div class="pain-meta">';
                html += '<span>&#128293; ' + item.frequency + ' 讨论</span>';
                html += '<span>&#128202; 痛度 ' + item.painLevel + '/10</span>';
                html += '<span>&#128172; ' + item.platform + '</span>';
                html += '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }
        
        // Setup category click handlers
        var pills = document.querySelectorAll(".cat-pill");
        for (var i = 0; i < pills.length; i++) {
            pills[i].addEventListener("click", function() {
                filterByCategory(this.getAttribute("data-cat"));
            });
        }
        
        // Initial render
        renderResults(allData);
    </script>
</body>
</html>
